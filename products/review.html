<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>VATREX Order Review</title>

    <link rel="stylesheet" href="../css/review.css">

</head>

<body>

    <div class="review-page">

        <div class="logo-container">
            <img src="../images/VATREXX.webp"
                 class="logo"
                 alt="VATREX">
        </div>

        <div class="review-card">

            <h1>Review Your Order</h1>
            <p>Please confirm your order before placing it.</p>

            <hr>

            <h2>Product</h2>

            <div class="product-section">

                <img id="product-image"
                     src=""
                     alt="Product">

                <div class="product-info">
                    <h3 id="product-name"></h3>
                    <p id="product-price"></p>
                </div>

            </div>

            <hr>

            <h2>Shipping Details</h2>

            <div class="shipping-details">

                <div class="row">
                    <span>Full Name</span>
                    <span id="customer-name"></span>
                </div>

                <div class="row">
                    <span>Email</span>
                    <span id="customer-email"></span>
                </div>

                <div class="row">
                    <span>Phone</span>
                    <span id="customer-phone"></span>
                </div>

                <div class="row">
                    <span>Governorate</span>
                    <span id="customer-governorate"></span>
                </div>

                <div class="row">
                    <span>City</span>
                    <span id="customer-city"></span>
                </div>

                <div class="row">
                    <span>Street</span>
                    <span id="customer-street"></span>
                </div>

                <div class="row">
                    <span>Apartment</span>
                    <span id="customer-apartment"></span>
                </div>

                <div class="row">
                    <span>Postal Code</span>
                    <span id="customer-postal"></span>
                </div>

            </div>

            <hr>

            <h2>Order Summary</h2>

            <div class="summary">

                <div class="row">
                    <span>Product Price</span>
                    <span id="summary-product-price"></span>
                </div>
                <div class="row">
                <span>quantity</span>
                <span id="summary-quantity"></span>

                </div>
                <div class="row">
                    <span>Shipping</span>
                    <span id="summary-shipping"></span>
                </div>

                <div class="row total">
                    <span>Total</span>
                    <span id="summary-total"></span>
                </div>

            </div>

            <div class="buttons">
                <button id="back-button">
                    Back
                </button>

                <button id="confirm-button">
                    Confirm Order
                </button>

            </div>

        </div>

    </div>

    <script src="../javascript/review.js"></script>

</body>

</html>
