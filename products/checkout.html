

<head>



    <meta charset="UTF-8">



    <meta name="viewport"

          content="width=device-width, initial-scale=1.0">



    <title>VATREX Checkout</title>



    <link rel="stylesheet"

          href="../css/checkout.css">



</head>
<body>

    <div class="checkout-page">

        <div class="logo-container">
            <img src="../images/VATREXX.webp"

            class="logo"

            alt="VATREX">
        </div>

        <div class="checkout-form">

            <h1 class="start">Checkout</h1>
            <p class="starter">Complete your order below.</p>


            <form id="checkoutForm">

                <label for="fullname">Full Name</label>



        <input

        id="fullname"

        type="text"

        name="fullname"

        placeholder="Enter your full name"

        required>

        <label for="email">Email</label>



        <input

        id="email"

        type="email"

        name="email"

        placeholder="Enter your e-mail"

        required>

        <label for="phone">Phone number</label>

        <input

        id="phone"

        type="tel"

        name="phone"

        placeholder="Enter your phone number"

        required>

            </form>

        </div>

    </div>

</body>
</html>
